<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نفحات الرحمة</title>
<style>
body{font-family:sans-serif;background:#0b3d2e;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;direction:rtl;text-align:center}
.box{max-width:400px;padding:30px}
h1{color:#e8c95a;font-size:28px;margin-bottom:10px}
p{color:#a8d5ba;margin:8px 0}
.btn{display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#0b3d2e,#1a7a5a);color:#fff;border:none;border-radius:12px;font-size:16px;font-family:inherit;cursor:pointer;margin:10px 5px;text-decoration:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.load{margin:20px 0}
.spin{width:30px;height:30px;border:3px solid rgba(255,255,255,.2);border-top-color:#e8c95a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#e74c3c;display:none;margin:10px 0}
</style>
</head>
<body>
<div class="box">
<h1>نَفَحَاتُ الرَّحْمَةِ</h1>
<p>الصَّدَقَةُ الجَارِيَةُ عَلَى أَرْوَاحِ الْمُسْلِمِينَ</p>
<div class="load" id="loader"><div class="spin"></div><p style="font-size:13px;margin-top:10px">جاري التحميل...</p></div>
<div class="err" id="err">
<p>⚠️ لم يتم تحميل الموقع</p>
<p style="font-size:12px">جرب فتحه من رابط آخر:</p>
<a class="btn" id="altLink" href="#">🔄 فتح من CDN</a>
<br>
<a class="btn" href="https://github.com/galalemad75-creator/alsadaqa-aljaria/raw/master/index.html" style="background:linear-gradient(135deg,#333,#555)">📥 تحميل مباشر</a>
</div>
</div>
<script>
(function(){
var cdnUrl='https://cdn.jsdelivr.net/gh/galalemad75-creator/alsadaqa-aljaria@master/index.html';
var rawUrl='https://raw.githubusercontent.com/galalemad75-creator/alsadaqa-aljaria/master/index.html';
var pagesUrl='https://galalemad75-creator.github.io/alsadaqa-aljaria/';

// Try to load the actual site
var sources=[pagesUrl, cdnUrl, rawUrl];
var idx=0;

function tryLoad(){
  if(idx>=sources.length){
    document.getElementById('loader').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('altLink').href=cdnUrl;
    return;
  }
  var url=sources[idx];
  var img=new Image();
  img.onload=function(){
    // Source is accessible, redirect
    window.location.href=url;
  };
  img.onerror=function(){
    idx++;
    tryLoad();
  };
  // Use fetch to check if URL is accessible
  fetch(url,{method:'HEAD',mode:'no-cors'}).then(function(r){
    window.location.href=url;
  }).catch(function(){
    idx++;
    tryLoad();
  });
}

// Start trying after a short delay
setTimeout(tryLoad, 500);

// If still on this page after 8 seconds, show error
setTimeout(function(){
  if(document.getElementById('loader').style.display!=='none'){
    document.getElementById('loader').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('altLink').href=cdnUrl;
  }
}, 8000);
})();
</script>
</body>
</html>
